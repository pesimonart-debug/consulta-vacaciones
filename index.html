<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Días Libres</title>
    <style>
        /* Estilos Generales */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #2c3d46;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            color: #2c3d46;
            font-size: 24px;
            margin-bottom: 30px;
        }

        /* Input y Botones */
        input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            box-sizing: border-box;
            color: #2c3d46;
        }

        .btn-primary {
            background-color: #3455AA;
            color: #ffffff;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.3s;
        }

        .btn-outline {
            background-color: #ffffff;
            color: #3455AA;
            border: 1px solid #3455AA;
            padding: 12px 0;
            width: 100%;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Pantalla de Resultados */
        .result-card {
            background-color: #f6f6f6;
            padding: 40px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #a0a0a0; /* Color gris suave para el texto según referencia */
        }

        .result-card p {
            margin: 10px 0;
        }

        /* Alerta Inferior */
        .footer-alert {
            background-color: #fff1e6;
            color: #e67e22;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 20px;
        }

        /* Control de pantallas */
        #screen-results { display: none; }
    </style>
</head>
<body>

        <h1>Conoce tus días libres</h1>
        <input type="text" id="rutInput" placeholder="Ingresa tu rut">
        <button class="btn-primary" onclick="buscarDatos()">Mis vacaciones</button>
        
        <div class="footer-alert">
            Los días administrativos <strong>cuentan desde marzo a marzo año calendario</strong>
        </div>
    </div>

    <div id="screen-results" class="container">
        <div class="result-card" id="card-content">
            </div>
        <button class="btn-primary" onclick="volver()">volver</button>
    </div>
